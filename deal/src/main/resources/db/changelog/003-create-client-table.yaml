databaseChangeLog:
  - changeSet:
      id: 003-create-client-table
      author: jokerSharp
      changes:
        - createTable:
            tableName: client
            columns:
              - column:
                  name: client_id
                  type: UUID
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    primaryKey: true
              - column:
                  name: first_name
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: VARCHAR(30)
              - column:
                  name: birth_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR
              - column:
                  name: marital_status
                  type: VARCHAR
              - column:
                  name: dependent_amount
                  type: INTEGER
              - column:
                  name: passport_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: employment_id
                  type: UUID
              - column:
                  name: account_number
                  type: VARCHAR(20)

        - addForeignKeyConstraint:
            baseTableName: client
            baseColumnNames: passport_id
            referencedTableName: passport
            referencedColumnNames: passport_id
            constraintName: fk_client_passport

        - addForeignKeyConstraint:
            baseTableName: client
            baseColumnNames: employment_id
            referencedTableName: employment
            referencedColumnNames: employment_id
            constraintName: fk_client_employment

      rollback:
        - dropTable:
            tableName: client