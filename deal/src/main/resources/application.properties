spring.application.name=deal

server.port=8081

springdoc.swagger-ui.path=/

spring.profiles.active=${SPRING_PROFILES_ACTIVE}

spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=/db/changelog/changelog-master.yaml

spring.kafka.producer.client-id=deal-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.project.deal.util.serialization.EmailMessageDtoSerializer